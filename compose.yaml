services:
  postgres:
    image: postgres:17-alpine
    container_name: code-relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: code_relay
      POSTGRES_USER: code_relay
      POSTGRES_PASSWORD: code_relay
    ports:
      - "5432:5432"
    volumes:
      - code-relay-postgres:/var/lib/postgresql/data

volumes:
  code-relay-postgres:
